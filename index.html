<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор баллов</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            margin: 0;
            min-height: 100vh;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        h1 { margin: 0 0 5px 0; font-weight: 600; color: #1a1a2e; }
        .sub { color: #666; margin-bottom: 25px; font-size: 0.95rem; }
        
        .balance-box {
            background: #eef2ff;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
        }
        .balance {
            font-size: 2rem;
            font-weight: 700;
            color: #4a6cf7;
        }
        .balance-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .balance-controls input {
            width: 80px;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            text-align: center;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: #4a6cf7;
            color: white;
        }
        .btn-primary:hover { background: #3a56d4; }
        .btn-outline {
            background: white;
            border: 1px solid #ddd;
        }
        .btn-outline:hover { background: #f5f5f5; }
        .btn-danger {
            background: #ff4757;
            color: white;
        }
        .btn-danger:hover { background: #e63946; }
        .btn-sm { padding: 4px 10px; font-size: 0.8rem; }

        .section-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin: 25px 0 12px 0;
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
        }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #fafafa;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid #eee;
        }
        .task-item:hover { background: #f5f7ff; }
        .task-name { font-weight: 500; }
        .task-points {
            background: #e8ecf1;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a6cf7;
        }
        .task-actions { display: flex; gap: 6px; }

        .add-area {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0 10px 0;
        }
        .add-area input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.95rem;
            min-width: 120px;
        }
        .add-area input:focus { outline: none; border-color: #4a6cf7; }

        .empty {
            text-align: center;
            color: #999;
            padding: 30px 0;
        }

        .footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 0.8rem;
            color: #888;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        code {
            background: #f0f0f0;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎯 Баллы</h1>
    <div class="sub">Управление баллами и товарами</div>

    <!-- Баланс -->
    <div class="balance-box">
        <span style="font-weight: 500;">💰 Баланс</span>
        <span class="balance" id="balanceDisplay">0</span>
        <div class="balance-controls">
            <input type="number" id="pointsInput" value="10" min="1">
            <button class="btn btn-primary" id="addPointsBtn">+</button>
            <button class="btn btn-outline" id="resetBalanceBtn">Сброс</button>
        </div>
    </div>

    <!-- Список товаров -->
    <div class="section-title">📦 Товары (<span id="taskCount">0</span>)</div>
    <ul class="task-list" id="taskListContainer">
        <li class="empty">Нет товаров. Добавьте первый!</li>
    </ul>

    <!-- Добавление товара -->
    <div class="add-area">
        <input type="text" id="taskNameInput" placeholder="Название товара">
        <input type="number" id="taskPointsInput" value="10" min="1" style="max-width: 100px;">
        <button class="btn btn-primary" id="addTaskBtn">➕ Добавить</button>
    </div>

    <!-- Кнопки управления -->
    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;">
        <button class="btn btn-outline btn-sm" id="clearAllBtn">🗑 Очистить всё</button>
        <button class="btn btn-outline btn-sm" id="addExampleBtn">📋 Добавить пример</button>
    </div>

    <div class="footer">
        <span>📁 Данные в <code>localStorage</code></span>
        <span>GitHub Pages ready</span>
    </div>
</div>

<script>
(function() {
    // --- Константы ---
    const STORAGE_KEY_BALANCE = 'myBalance';
    const STORAGE_KEY_TASKS = 'myTasks';

    // --- Состояние ---
    let balance = parseInt(localStorage.getItem(STORAGE_KEY_BALANCE)) || 0;
    let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY_TASKS)) || [];

    // --- DOM элементы ---
    const balanceDisplay = document.getElementById('balanceDisplay');
    const pointsInput = document.getElementById('pointsInput');
    const addPointsBtn = document.getElementById('addPointsBtn');
    const resetBalanceBtn = document.getElementById('resetBalanceBtn');
    const taskListContainer = document.getElementById('taskListContainer');
    const taskCount = document.getElementById('taskCount');
    const taskNameInput = document.getElementById('taskNameInput');
    const taskPointsInput = document.getElementById('taskPointsInput');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const addExampleBtn = document.getElementById('addExampleBtn');

    // --- Вспомогательные ---
    function generateId() {
        return Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    }

    function save() {
        localStorage.setItem(STORAGE_KEY_BALANCE, String(balance));
        localStorage.setItem(STORAGE_KEY_TASKS, JSON.stringify(tasks));
    }

    function render() {
        // Баланс
        balanceDisplay.textContent = balance;

        // Список
        if (tasks.length === 0) {
            taskListContainer.innerHTML = '<li class="empty">Нет товаров. Добавьте первый!</li>';
            taskCount.textContent = '0';
        } else {
            let html = '';
            tasks.forEach(task => {
                html += `
                    <li class="task-item" data-id="${task.id}">
                        <div>
                            <span class="task-name">${escapeHtml(task.name)}</span>
                            <span class="task-points">${task.points} баллов</span>
                        </div>
                        <div class="task-actions">
                            <button class="btn btn-outline btn-sm btn-dec" data-id="${task.id}">−5</button>
                            <button class="btn btn-outline btn-sm btn-inc" data-id="${task.id}">+5</button>
                            <button class="btn btn-danger btn-sm btn-del" data-id="${task.id}">✕</button>
                        </div>
                    </li>
                `;
            });
            taskListContainer.innerHTML = html;
            taskCount.textContent = tasks.length;
        }

        save();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // --- Действия ---
    function updateBalance(newBalance) {
        balance = Math.max(0, Math.floor(newBalance));
        render();
    }

    function addTask(name, points) {
        const trimmed = name.trim();
        if (!trimmed) { alert('Введите название!'); return false; }
        const pts = parseInt(points);
        if (isNaN(pts) || pts < 1) { alert('Баллы должны быть > 0'); return false; }

        tasks.push({
            id: generateId(),
            name: trimmed,
            points: pts
        });
        render();
        return true;
    }

    function removeTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        render();
    }

    function changeTaskPoints(id, delta) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;
        const newPoints = task.points + delta;
        if (newPoints < 1) { alert('Минимум 1 балл'); return; }
        task.points = newPoints;
        render();
    }

    function clearAll() {
        if (tasks.length === 0) return;
        if (confirm('Удалить все товары?')) {
            tasks = [];
            render();
        }
    }

    function addExample() {
        const examples = [
            { name: 'Наушники', points: 30 },
            { name: 'Клавиатура', points: 25 },
            { name: 'Мышь', points: 15 }
        ];
        examples.forEach(ex => {
            tasks.push({
                id: generateId(),
                name: ex.name,
                points: ex.points
            });
        });
        render();
    }

    // --- Инициализация ---
    function init() {
        // Если tasks пустые, но в localStorage нет — оставляем пустыми (максимально пусто)
        render();

        // --- События ---
        addPointsBtn.addEventListener('click', () => {
            const val = parseInt(pointsInput.value);
            if (isNaN(val) || val < 1) { alert('Введите положительное число'); return; }
            updateBalance(balance + val);
        });

        resetBalanceBtn.addEventListener('click', () => {
            if (balance === 0) return;
            if (confirm('Сбросить баланс до 0?')) updateBalance(0);
        });

        addTaskBtn.addEventListener('click', () => {
            addTask(taskNameInput.value, taskPointsInput.value);
            taskNameInput.value = '';
            taskPointsInput.value = '10';
            taskNameInput.focus();
        });

        // Enter
        taskNameInput.addEventListener('keypress', e => { if (e.key === 'Enter') addTaskBtn.click(); });
        taskPointsInput.addEventListener('keypress', e => { if (e.key === 'Enter') addTaskBtn.click(); });
        pointsInput.addEventListener('keypress', e => { if (e.key === 'Enter') addPointsBtn.click(); });

        clearAllBtn.addEventListener('click', clearAll);
        addExampleBtn.addEventListener('click', addExample);

        // Делегирование для кнопок в списке
        taskListContainer.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const id = btn.dataset.id;
            if (!id) return;

            if (btn.classList.contains('btn-del')) {
                const task = tasks.find(t => t.id === id);
                if (task && confirm(`Удалить "${task.name}"?`)) removeTask(id);
                return;
            }

            if (btn.classList.contains('btn-inc')) {
                changeTaskPoints(id, 5);
                return;
            }

            if (btn.classList.contains('btn-dec')) {
                changeTaskPoints(id, -5);
                return;
            }
        });
    }

    init();
})();
</script>
</body>
</html>
