<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор баллов</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        h1 {
            margin: 0 0 5px 0;
            font-weight: 600;
            color: #1a1a2e;
        }
        .sub {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 0;
            margin: 20px 0 0 0;
            border-bottom: 2px solid #e8ecf1;
        }
        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            color: #888;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn:hover {
            color: #4a6cf7;
        }
        .tab-btn.active {
            color: #4a6cf7;
            border-bottom-color: #4a6cf7;
        }
        .tab-content {
            display: none;
            padding-top: 15px;
        }
        .tab-content.active {
            display: block;
        }

        .section-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin: 0 0 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #fafafa;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid #eee;
        }
        .task-item:hover {
            background: #f5f7ff;
        }
        .task-name {
            font-weight: 500;
        }
        .task-points {
            background: #e8ecf1;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a6cf7;
        }
        .task-actions {
            display: flex;
            gap: 6px;
        }

        .add-area {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0 10px 0;
        }
        .add-area input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.95rem;
            min-width: 120px;
        }
        .add-area input:focus {
            outline: none;
            border-color: #4a6cf7;
        }
        .add-area select {
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.95rem;
            background: white;
            cursor: pointer;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 20px 0;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: #4a6cf7;
            color: white;
        }
        .btn-primary:hover {
            background: #3a56d4;
        }
        .btn-success {
            background: #2ed573;
            color: white;
        }
        .btn-success:hover {
            background: #26a65b;
        }
        .btn-danger {
            background: #ff4757;
            color: white;
        }
        .btn-danger:hover {
            background: #e63946;
        }
        .btn-warning {
            background: #ffa502;
            color: white;
        }
        .btn-warning:hover {
            background: #e69500;
        }
        .btn-outline {
            background: white;
            border: 1px solid #ddd;
        }
        .btn-outline:hover {
            background: #f5f5f5;
        }
        .btn-sm {
            padding: 4px 10px;
            font-size: 0.8rem;
        }

        .badge {
            background: #4a6cf7;
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .badge-success {
            background: #2ed573;
        }

        .status {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
        }
        .status-success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status-warning {
            background: #fff3e0;
            color: #e65100;
        }
        .status-error {
            background: #ffebee;
            color: #c62828;
        }

        .total-box {
            background: #eef2ff;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 15px 0;
        }
        .total-label {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .total-value {
            font-size: 2rem;
            font-weight: 700;
            color: #4a6cf7;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 15px 0 10px 0;
        }
        .url-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 8px;
            background: #fafafa;
        }
        .url-input:focus {
            outline: none;
            border-color: #4a6cf7;
            background: white;
        }
        .notice {
            margin-top: 16px;
            font-size: 0.75rem;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 12px;
            text-align: center;
        }

        .completed-item {
            opacity: 0.7;
            background: #f0faf0;
            border-color: #b8e0c7;
        }
        .completed-item .task-name {
            text-decoration: line-through;
        }
        .tab-count {
            background: #e8ecf1;
            padding: 0 8px;
            border-radius: 12px;
            font-size: 0.75rem;
        }
        .tab-btn.active .tab-count {
            background: #4a6cf7;
            color: white;
        }
        .tab-total {
            font-size: 0.8rem;
            color: #666;
            font-weight: 400;
        }
        .tab-btn.active .tab-total {
            color: #4a6cf7;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎯 Калькулятор баллов</h1>
    <div class="sub">
        📦 Товары загружаются из <code>item.js</code>
        <span class="status status-success" id="loadStatus">● Загружено</span>
    </div>

    <!-- Вкладки -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="active">
            📋 Активные 
            <span class="tab-count" id="activeTabCount">0</span>
            <span class="tab-total" id="activeTabTotal">(0 баллов)</span>
        </button>
        <button class="tab-btn" data-tab="completed">
            ✅ Полученные 
            <span class="tab-count" id="completedTabCount">0</span>
            <span class="tab-total" id="completedTabTotal">(0 баллов)</span>
        </button>
    </div>

    <!-- Содержимое вкладок -->
    <div class="tab-content active" id="tab-active">
        <ul class="task-list" id="taskListContainer">
            <li class="empty">Нет активных товаров</li>
        </ul>
    </div>

    <div class="tab-content" id="tab-completed">
        <ul class="task-list" id="completedListContainer">
            <li class="empty">Нет полученных товаров</li>
        </ul>
    </div>

    <!-- Добавление товара -->
    <div class="add-area">
        <input type="text" id="taskNameInput" placeholder="Название товара">
        <select id="taskPointsSelect">
            <option value="250">250 баллов</option>
            <option value="200">200 баллов</option>
        </select>
        <button class="btn btn-primary" id="addTaskBtn">➕ Добавить</button>
    </div>

    <!-- Кнопки управления -->
    <div class="btn-group">
        <button class="btn btn-success btn-sm" id="exportBtn">📤 Экспорт в item.js</button>
        <button class="btn btn-warning btn-sm" id="reloadBtn">🔄 Перезагрузить</button>
        <button class="btn btn-danger btn-sm" id="clearCompletedBtn">🗑 Очистить полученные</button>
    </div>

    <!-- Настройка URL -->
    <div style="margin-top: 12px;">
        <label style="font-size: 0.85rem; color: #666;">🔗 URL для загрузки item.js:</label>
        <input type="text" id="itemsUrlInput" class="url-input" 
               placeholder="https://raw.githubusercontent.com/mihail245/ball/refs/heads/main/item.js">
        <button class="btn btn-outline btn-sm" id="applyUrlBtn" style="margin-top: 6px;">Применить URL</button>
    </div>

    <div class="notice">⚠️ Данные НЕ сохраняются — всё сбрасывается при обновлении страницы</div>
</div>

<script>
    (function() {
        "use strict";

        const DEFAULT_URL = 'https://raw.githubusercontent.com/mihail245/ball/refs/heads/main/item.js';
        let activeTasks = [];
        let completedTasks = [];
        let itemsUrl = DEFAULT_URL;

        // DOM элементы
        const taskListContainer = document.getElementById('taskListContainer');
        const completedListContainer = document.getElementById('completedListContainer');
        const activeTabCount = document.getElementById('activeTabCount');
        const completedTabCount = document.getElementById('completedTabCount');
        const activeTabTotal = document.getElementById('activeTabTotal');
        const completedTabTotal = document.getElementById('completedTabTotal');
        const taskNameInput = document.getElementById('taskNameInput');
        const taskPointsSelect = document.getElementById('taskPointsSelect');
        const addTaskBtn = document.getElementById('addTaskBtn');
        const exportBtn = document.getElementById('exportBtn');
        const reloadBtn = document.getElementById('reloadBtn');
        const clearCompletedBtn = document.getElementById('clearCompletedBtn');
        const loadStatus = document.getElementById('loadStatus');
        const itemsUrlInput = document.getElementById('itemsUrlInput');
        const applyUrlBtn = document.getElementById('applyUrlBtn');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        function generateId() {
            return 'item_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
        }

        function setStatus(type, message) {
            loadStatus.textContent = message;
            loadStatus.className = 'status status-' + type;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Переключение вкладок
        function switchTab(tabId) {
            tabBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabId);
            });
            tabContents.forEach(content => {
                content.classList.toggle('active', content.id === 'tab-' + tabId);
            });
        }

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                switchTab(btn.dataset.tab);
            });
        });

        function render() {
            // Активные товары
            if (activeTasks.length === 0) {
                taskListContainer.innerHTML = '<li class="empty">Нет активных товаров</li>';
            } else {
                let html = '';
                activeTasks.forEach(task => {
                    html += `
                        <li class="task-item" data-id="${task.id}">
                            <div>
                                <span class="task-name">${escapeHtml(task.name)}</span>
                                <span class="task-points">${task.points} баллов</span>
                            </div>
                            <div class="task-actions">
                                <button class="btn btn-success btn-sm btn-complete" data-id="${task.id}">✅ Получен</button>
                                <button class="btn btn-danger btn-sm btn-del" data-id="${task.id}">✕</button>
                            </div>
                        </li>
                    `;
                });
                taskListContainer.innerHTML = html;
            }

            // Полученные товары
            if (completedTasks.length === 0) {
                completedListContainer.innerHTML = '<li class="empty">Нет полученных товаров</li>';
            } else {
                let html = '';
                completedTasks.forEach(task => {
                    html += `
                        <li class="task-item completed-item" data-id="${task.id}">
                            <div>
                                <span class="task-name">${escapeHtml(task.name)}</span>
                                <span class="task-points">${task.points} баллов</span>
                            </div>
                            <div class="task-actions">
                                <button class="btn btn-outline btn-sm btn-undo" data-id="${task.id}">↩️ Вернуть</button>
                                <button class="btn btn-danger btn-sm btn-del-completed" data-id="${task.id}">✕</button>
                            </div>
                        </li>
                    `;
                });
                completedListContainer.innerHTML = html;
            }

            // Подсчёт сумм
            const activeSum = activeTasks.reduce((acc, t) => acc + t.points, 0);
            const completedSum = completedTasks.reduce((acc, t) => acc + t.points, 0);

            // Обновляем счётчики и суммы на вкладках
            activeTabCount.textContent = activeTasks.length;
            completedTabCount.textContent = completedTasks.length;
            activeTabTotal.textContent = `(${activeSum} баллов)`;
            completedTabTotal.textContent = `(${completedSum} баллов)`;
        }

        async function loadItemsFromUrl(url) {
            try {
                setStatus('warning', '⏳ Загрузка...');
                
                const finalUrl = url || DEFAULT_URL;
                
                const response = await fetch(finalUrl);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const text = await response.text();
                
                let data = null;
                const match = text.match(/\[[\s\S]*?\]/);
                if (match) {
                    try {
                        data = JSON.parse(match[0]);
                    } catch (e) {
                        try {
                            const func = new Function('return ' + match[0]);
                            data = func();
                        } catch (e2) {
                            throw new Error('Не удалось распарсить данные');
                        }
                    }
                }
                
                if (data && Array.isArray(data) && data.length > 0) {
                    activeTasks = [];
                    completedTasks = [];
                    
                    data.forEach(item => {
                        const task = {
                            id: item.id || generateId(),
                            name: item.name || 'Без названия',
                            points: parseInt(item.points) || 250,
                            completed: item.completed === true
                        };
                        
                        if (task.completed) {
                            completedTasks.push(task);
                        } else {
                            activeTasks.push(task);
                        }
                    });
                    
                    setStatus('success', `✅ Загружено ${data.length} товаров (${activeTasks.length} активных, ${completedTasks.length} полученных)`);
                    render();
                } else {
                    activeTasks = [];
                    completedTasks = [];
                    setStatus('warning', '⚠️ Файл пуст или данные не найдены');
                    render();
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                setStatus('error', `❌ Ошибка: ${error.message}`);
                activeTasks = [];
                completedTasks = [];
                render();
            }
        }

        function exportItems() {
            const allTasks = [...activeTasks, ...completedTasks];
            if (allTasks.length === 0) {
                alert('Нет товаров для экспорта');
                return;
            }

            let content = '// item.js - список товаров\n';
            content += 'const ITEMS_DATA = [\n';
            allTasks.forEach((task, index) => {
                const isCompleted = completedTasks.some(t => t.id === task.id);
                content += `    { id: "${task.id}", name: "${task.name}", points: ${task.points}, completed: ${isCompleted} }`;
                if (index < allTasks.length - 1) content += ',';
                content += '\n';
            });
            content += '];\n\n';
            content += 'export default ITEMS_DATA;\n';

            const blob = new Blob([content], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'item.js';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            setStatus('success', '📤 Экспортировано в item.js');
        }

        function addTask(name, points) {
            const trimmed = name.trim();
            if (!trimmed) { alert('Введите название!'); return false; }
            const pts = parseInt(points);
            if (isNaN(pts) || pts < 1) { alert('Выберите количество баллов'); return false; }

            activeTasks.push({
                id: generateId(),
                name: trimmed,
                points: pts,
                completed: false
            });
            render();
            return true;
        }

        function removeActiveTask(id) {
            activeTasks = activeTasks.filter(t => t.id !== id);
            render();
        }

        function removeCompletedTask(id) {
            completedTasks = completedTasks.filter(t => t.id !== id);
            render();
        }

        function completeTask(id) {
            const index = activeTasks.findIndex(t => t.id === id);
            if (index === -1) return;
            const task = activeTasks.splice(index, 1)[0];
            task.completed = true;
            completedTasks.push(task);
            render();
        }

        function undoTask(id) {
            const index = completedTasks.findIndex(t => t.id === id);
            if (index === -1) return;
            const task = completedTasks.splice(index, 1)[0];
            task.completed = false;
            activeTasks.push(task);
            render();
        }

        function clearCompleted() {
            if (completedTasks.length === 0) return;
            if (confirm('Удалить все полученные товары?')) {
                completedTasks = [];
                render();
            }
        }

        async function init() {
            itemsUrlInput.value = DEFAULT_URL;
            await loadItemsFromUrl(DEFAULT_URL);

            // Переключаемся на первую вкладку
            switchTab('active');

            addTaskBtn.addEventListener('click', () => {
                addTask(taskNameInput.value, taskPointsSelect.value);
                taskNameInput.value = '';
                taskNameInput.focus();
            });

            taskNameInput.addEventListener('keypress', e => { if (e.key === 'Enter') addTaskBtn.click(); });

            exportBtn.addEventListener('click', exportItems);
            
            reloadBtn.addEventListener('click', async () => {
                await loadItemsFromUrl(itemsUrl);
            });

            clearCompletedBtn.addEventListener('click', clearCompleted);

            applyUrlBtn.addEventListener('click', () => {
                const url = itemsUrlInput.value.trim();
                if (url) {
                    itemsUrl = url;
                    loadItemsFromUrl(url);
                } else {
                    itemsUrl = DEFAULT_URL;
                    loadItemsFromUrl(DEFAULT_URL);
                }
            });

            // Делегирование для кнопок в списках
            taskListContainer.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                const id = btn.dataset.id;
                if (!id) return;

                if (btn.classList.contains('btn-complete')) {
                    completeTask(id);
                    return;
                }
                if (btn.classList.contains('btn-del')) {
                    const task = activeTasks.find(t => t.id === id);
                    if (task && confirm(`Удалить "${task.name}"?`)) removeActiveTask(id);
                    return;
                }
            });

            completedListContainer.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                const id = btn.dataset.id;
                if (!id) return;

                if (btn.classList.contains('btn-undo')) {
                    undoTask(id);
                    return;
                }
                if (btn.classList.contains('btn-del-completed')) {
                    const task = completedTasks.find(t => t.id === id);
                    if (task && confirm(`Удалить "${task.name}" из полученных?`)) removeCompletedTask(id);
                    return;
                }
            });
        }

        init();
    })();
</script>
</body>
</html>
